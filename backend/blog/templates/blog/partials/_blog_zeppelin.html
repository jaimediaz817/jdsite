{% load static %}
{% comment %} Zeppelin volador del footer — lleva las redes sociales como carga.
  Cruza horizontalmente. CSS animation. Hover → pausa. {% endcomment %}

<div class="zeppelin-zone" aria-hidden="true" style="display:block;visibility:visible;opacity:1;">
    <div class="zeppelin-track" id="zeppelinTrack">

        <svg class="zeppelin-svg" width="300" height="160" viewBox="0 0 300 160" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Cuerpo principal del zeppelin (elipse alargada) -->
            <ellipse cx="150" cy="60" rx="110" ry="45" fill="#1e293b" stroke="#818cf8" stroke-width="2.5"/>

            <!-- Detalle interno del cuerpo -->
            <ellipse cx="150" cy="60" rx="85" ry="30" fill="#0f172a" stroke="#475569" stroke-width="0.8"/>

            <!-- Ventana / cabina -->
            <ellipse cx="150" cy="60" rx="25" ry="18" fill="#0f172a" stroke="#818cf8" stroke-width="1.5"/>
            <ellipse cx="150" cy="58" rx="8" ry="5" fill="#a5b4fc" opacity="0.9"/>

            <!-- LED de estado -->
            <circle cx="150" cy="18" r="3.5" fill="#22c55e">
                <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite"/>
            </circle>

            <!-- Estructura / barquilla inferior -->
            <rect x="120" y="95" width="60" height="20" rx="4" fill="#1e293b" stroke="#818cf8" stroke-width="1.5"/>
            <line x1="130" y1="105" x2="130" y2="120" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
            <line x1="150" y1="105" x2="150" y2="125" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
            <line x1="170" y1="105" x2="170" y2="120" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>

            <!-- Cuerdas con iconos sociales -->

            <a href="https://twitter.com/jaimediaz817" target="_blank" rel="noopener noreferrer">
                <rect x="48" y="136" width="30" height="24" rx="6" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
