<div id="comments-list">
    {% for comment in comments %}
    <div class="jd-comment" data-comment-id="{{ comment.id }}">
        <div class="jd-comment-avatar">
            <div class="jd-author-avatar">{{ comment.author|first|upper }}</div>
        </div>
        <div class="jd-comment-body">
            <div class="jd-comment-bubble">
                <div class="jd-comment-meta">
                    <span class="jd-comment-name">{{ comment.author }}</span>
                    <span class="jd-comment-date">{{ comment.created_at|date:"d/m/Y" }}</span>
                </div>
                <p class="jd-comment-text">{{ comment.content }}</p>
            </div>
        </div>
    </div>
    {% empty %}
    <div class="jd-comments-empty">
        <div class="jd-comments-empty-icon"><i class="fas fa-comment-dots"></i></div>
        <div class="jd-comments-empty-title">Sin comentarios aún</div>
        <div class="jd-comments-empty-sub">Sé el primero en comentar.</div>
    </div>
    {% endfor %}

    <!-- Skeletons pendientes se inyectan acá vía JS -->
    <div id="pending-skeletons-container"></div>

    <!-- Sentinel para scroll infinito -->
    <div id="comments-load-sentinel" style="height:1px;width:100%;opacity:0;"></div>
</div>
