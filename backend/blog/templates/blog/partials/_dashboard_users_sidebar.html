{% comment %}
HU-027: Sidebar de gestión de usuarios (solo superadmin)
{% endcomment %}
{% load static %}

<!-- Usuarios recientes (superadmin) -->
{% if user.is_superuser and user_stats %}
<div class="sidebar-menu mt-3">
    <h2 class="sidebar-title" x-data="{ open: true }" @click="open = !open" role="button" tabindex="0">
        <i class="fas fa-users sidebar-title__icon" aria-hidden="true"></i>
        Usuarios
        <i class="fas fa-chevron-down arrow" :class="{'rotate-180': open}" style="float: right;"></i>
    </h2>
    <div class="user-stats-sidebar" x-show="open" x-collapse="">
        <div class="d-flex flex-column gap-1 mb-2">
            <small class="text-muted">Total: <strong>{{ user_stats.total }}</strong></small>
            <small class="text-muted">Activos: <strong class="text-success">{{ user_stats.active }}</strong></small>
            <small class="text-muted">Staff: <strong class="text-info">{{ user_stats.staff }}</strong></small>
        </div>
        <a href="{% url 'blog:dashboard_users' %}" class="btn btn-sm btn-outline-primary w-100">
            <i class="fas fa-users-cog me-1"></i>Gestionar usuarios
        </a>
    </div>
</div>
{% endif %}
