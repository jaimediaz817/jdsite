{% load static %}
<!-- Navigation menu (header) -->
<nav id="navigation-menu" class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4">
  <div class="container-fluid">
    <!-- Logo -->
    <a class="navbar-brand" href="{% url 'blog:dashboard' %}">
      <img src="{% static 'images/jd_firma.svg' %}" alt="JD Logo" height="30" class="d-inline-block align-text-top">
    </a>
    <!-- Toggler for mobile -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" href="{% url 'blog:dashboard' %}">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'blog:blog_list' %}">Artículos</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'blog:blog_editor' %}">Nuevo artículo</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'blog:dashboard_resources' %}">Recursos</a>
        </li>
      </ul>
      <!-- User menu (placeholder) -->
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
        {% if request.user.is_authenticated %}
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" id="userMenu" role="button" data-bs-toggle="dropdown" aria-expanded="false">
              {{ request.user.get_full_name|default:request.user.username }}
            </a>
            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userMenu">
              <li><a class="dropdown-item" href="{% url 'account_logout' %}">Cerrar sesión</a></li>
            </ul>
          </li>
        {% else %}
          <li class="nav-item"><a class="nav-link" href="{% url 'account_login' %}">Iniciar sesión</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'account_signup' %}">Registrarse</a></li>
        {% endif %}
      </ul>
    </div>
  </div>
</nav>
