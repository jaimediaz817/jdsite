{% extends 'base_auth.html' %}

{% block title %}Cerrar Sesión{% endblock %}

{% block content %}
<div class="card shadow-sm border-0">
    <div class="card-header text-center py-3" style="background: linear-gradient(135deg, #0891b2, #6f42c1) !important; color: white;">
        <h5 class="mb-0 font-weight-bold"><i class="fas fa-sign-out-alt mr-2"></i> Cerrar Sesión</h5>
    </div>
    <div class="card-body text-center py-5">
        <p class="card-text lead mb-4" style="color: #333; font-size: 1.1rem;">
            <i class="fas fa-question-circle text-primary mr-2"></i>
            ¿Estás seguro que deseas cerrar tu sesión?
        </p>
        <form method="post" class="d-inline-block">
            {% csrf_token %}
            <button type="submit" class="btn btn-primary px-4 py-2 mr-3" style="background: linear-gradient(135deg, #0891b2, #6f42c1); border: none; font-weight: 500;">
                <i class="fas fa-check mr-2"></i> Sí, cerrar sesión
            </button>
            <a href="javascript:history.back()" class="btn btn-inverted-primary px-4 py-2">
                <i class="fas fa-times mr-2"></i> Cancelar
            </a>
        </form>
    </div>
</div>
{% endblock %}
